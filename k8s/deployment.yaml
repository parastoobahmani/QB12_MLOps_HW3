
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airbnb-serving
spec:
  replicas: 2
  selector:
    matchLabels:
      app: airbnb-serving
  template:
    metadata:
      labels:
        app: airbnb-serving
    spec:
      containers:
        - name: airbnb-serving
          image: qbc12-airbnb-serving:optimized
          ports:
            - containerPort: 8000

          env:
            - name: MLFLOW_TRACKING_URI
              valueFrom:
                secretKeyRef:
                  name: airbnb-serving-secret
                  key: MLFLOW_TRACKING_URI

            - name: MLFLOW_TRACKING_USERNAME
              valueFrom:
                secretKeyRef:
                  name: airbnb-serving-secret
                  key: MLFLOW_TRACKING_USERNAME

            - name: MLFLOW_TRACKING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: airbnb-serving-secret
                  key: MLFLOW_TRACKING_PASSWORD

            - name: MODEL_RUN_ID
              valueFrom:
                secretKeyRef:
                  name: airbnb-serving-secret
                  key: MODEL_RUN_ID

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
